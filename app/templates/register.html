{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center fade-in">
    <div class="col-md-5">
        <div class="card p-4 p-md-5 mt-5 border-0">
            <div class="text-center mb-4">
                <div class="bg-primary bg-opacity-10 p-3 rounded-circle d-inline-block mb-3">
                    <i class="fas fa-user-plus text-primary fs-3"></i>
                </div>
                <h2 class="fw-bold">Create Account</h2>
                <p class="text-muted">Start securing your files with RSA encryption</p>
            </div>
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label fw-medium">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" name="username" class="form-control bg-light border-0 py-2" placeholder="Choose a unique username" required>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-medium">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-0"><i class="fas fa-key text-muted"></i></span>
                        <input type="password" name="password" class="form-control bg-light border-0 py-2" placeholder="Create a strong password" required>
                    </div>
                    <div class="form-text mt-2 small">Your password is used to encrypt your RSA private key.</div>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 mb-3">
                    Register Account
                </button>
            </form>
            <p class="text-center mt-3 text-muted">Already have an account? <a href="{{ url_for('auth.login') }}" class="text-primary fw-semibold text-decoration-none">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
